name: Kind TFT

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - ci-change

concurrency:
  group: kind-tft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-dpu-non-offload:
    uses: Venkat-Kunaparaju/dpu-simulator/.github/workflows/kind-tft.yml@tft-tests
    with:
      config: ci/config-kind.yaml
      tft-repo-url: https://github.com/${{ github.event.pull_request.head.repo.full_name || github.repository }}
      tft-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      artifact-prefix: kind-dpu-non-offload

  kind-dpu-offload:
    uses: Venkat-Kunaparaju/dpu-simulator/.github/workflows/kind-tft.yml@tft-tests
    with:
      config: ci/config-kind-ovnk-offload.yaml
      tft-repo-url: https://github.com/${{ github.event.pull_request.head.repo.full_name || github.repository }}
      tft-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      artifact-prefix: kind-dpu-offload
